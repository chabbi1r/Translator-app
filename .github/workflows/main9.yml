name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract project
        run: unzip NvidiaTranslator-Android-Source.zip

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          wget https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip gradle-8.4-bin.zip
          export PATH=$PATH:$(pwd)/gradle-8.4/bin
          echo "$(pwd)/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          cd android-nvidia-translator
          gradle assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android-nvidia-translator/app/build/outputs/apk/debug/app-debug.apk
