name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract project
        run: unzip NvidiaTranslator-Android-Source.zip

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: |
          cd android-nvidia-translator
          chmod +x gradlew

      - name: Build APK
        run: |
          cd android-nvidia-translator
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android-nvidia-translator/app/build/outputs/apk/debug/app-debug.apk
